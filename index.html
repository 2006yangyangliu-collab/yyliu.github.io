<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刘扬扬 - 个人简历</title>
    <style>
        :root {
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
            --line-color: #eee;
            --accent: #34495e;
        }

        body { 
            font-family: 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif; 
            background: #ffffff; 
            color: var(--text-main); 
            margin: 0; 
            line-height: 1.7;
        }

        .container { 
            max-width: 800px; 
            margin: 80px auto; 
            padding: 0 40px; 
        }

        /* 头部设计：简洁有力 */
        header { 
            margin-bottom: 60px; 
        }

        h1 { 
            font-size: 2.4rem; 
            font-weight: 300; 
            letter-spacing: 5px; 
            margin: 0 0 20px 0; 
        }

        .contact-info { 
            font-size: 0.9rem; 
            color: var(--text-light); 
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .contact-info span::after { content: " /"; margin-left: 15px; }
        .contact-info span:last-child::after { content: ""; }

        /* 栏目样式 */
        section { margin-bottom: 50px; }

        .section-title { 
            font-size: 0.8rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: var(--accent);
            border-bottom: 1px solid var(--line-color);
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .intro-text { font-size: 1rem; color: #555; }

        /* 技能标签 */
        .skills { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .skill-tag { 
            font-size: 0.85rem; 
            padding: 4px 12px; 
            border: 1px solid var(--line-color); 
            color: var(--text-light);
            transition: all 0.3s;
        }
        .skill-tag:hover { border-color: var(--accent); color: var(--accent); }

        /* 照片/证书展示网格 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 30px; 
        }

        .card { 
            background: #fff; 
            transition: transform 0.3s ease;
        }

        .image-placeholder { 
            width: 100%; 
            aspect-ratio: 1.4 / 1; 
            background: #f9f9f9; 
            overflow: hidden; 
            border: 1px solid #f0f0f0;
        }

        .image-placeholder img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* 保证证书不被裁剪 */
            padding: 10px;
        }

        .card-label { 
            margin-top: 12px; 
            font-size: 0.85rem; 
            color: var(--text-light); 
            text-align: center;
        }

        @media (max-width: 600px) {
            .container { margin: 40px auto; padding: 0 20px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>刘扬扬</h1>
        <div class="contact-info">
            <span>2006年生</span>
            <span>长安大学 · 车辆工程 (2025级)</span>
            <span>15770380579</span>
            <span>2006yangyangliu@gmail.com</span>
        </div>
    </header>

    <section>
        <div class="section-title">Summary / 技能概览</div>
        <div class="intro-text">
            专注于车辆工程专业领域的探索，具备扎实的工程数理基础。拥有良好的跨团队沟通能力与严谨的逻辑分析能力。
        </div>
        <div class="skills">
            <div class="skill-tag">车辆构造基础</div>
            <div class="skill-tag">CAD/建模预研</div>
            <div class="skill-tag">逻辑建模</div>
            <div class="skill-tag">英语交流</div>
            <div class="skill-tag">协作领导力</div>
        </div>
    </section>

    <section>
        <div class="section-title">High School / 高中荣誉</div>
        <div class="grid">
            <div class="card">
                <div class="image-placeholder">
                    <img src="highschool-1.jpg" alt="证书1">
                </div>
                <div class="card-label">数学竞赛奖项</div>
            </div>
            <div class="card">
                <div class="image-placeholder">
                    <img src="highschool-2.jpg" alt="证书2">
                </div>
                <div class="card-label">三好学生荣誉</div>
            </div>
        </div>
    </section>

    <section>
        <div class="section-title">University / 大学活动</div>
        <div class="grid">
            <div class="card">
                <div class="image-placeholder">
                    <img src="college-1.jpg" alt="活动证明">
                </div>
                <div class="card-label">长安大学志愿者服务证明</div>
            </div>
        </div>
    </section>
</div>

</body>
</html>
